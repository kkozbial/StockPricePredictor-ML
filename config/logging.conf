[loggers]
keys=root,data_fetch,preprocessing,yfinance,urllib3,requests

[handlers]
keys=consoleHandler,dataFetchHandler,preprocessingHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_yfinance]
level=WARNING
handlers=consoleHandler
qualname=yfinance
propagate=0

[logger_urllib3]
level=WARNING
handlers=consoleHandler
qualname=urllib3
propagate=0

[logger_requests]
level=WARNING
handlers=consoleHandler
qualname=requests
propagate=0

[logger_data_fetch]
level=INFO
handlers=dataFetchHandler
qualname=data_fetch
propagate=0

[logger_preprocessing]
level=INFO
handlers=preprocessingHandler
qualname=preprocessing
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_dataFetchHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('logs/data_fetch.log','a')

[handler_preprocessingHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('logs/preprocessing.log','a')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
